name: Build NagramX-Stealth

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "NagramX release tag (leave empty for latest)"
        required: false
        default: ""
  schedule:
    - cron: "13 11 * * *"
    - cron: "13 16 * * *"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  UPSTREAM_REPO: "risin42/NagramX"
  APP_NAME: "Telegram"

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      tag: ${{ steps.resolve.outputs.tag }}
      upstream_name: ${{ steps.resolve.outputs.upstream_name }}
      upstream_body: ${{ steps.resolve.outputs.upstream_body }}
    steps:
      - name: Resolve upstream tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh release list --repo "$UPSTREAM_REPO" --json tagName,isLatest \
              --jq '.[] | select(.isLatest) | .tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "🏷️ Target release: $TAG"

          RELEASE=$(gh release view "$TAG" --repo "$UPSTREAM_REPO" --json name,body)
          {
            echo 'upstream_name<<NAME_EOF'
            echo "$RELEASE" | jq -r '.name // ""'
            echo 'NAME_EOF'
            echo 'upstream_body<<BODY_EOF'
            echo "$RELEASE" | jq -r '.body // ""'
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: check
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq '.[].tagName' | grep -qE "^${TAG}(-[0-9]+)?$"; then
            echo "⏭️ Release for $TAG already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Download upstream APK
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          echo "📥 Downloading APKs from ${{ env.UPSTREAM_REPO }} @ $TAG"
          mkdir -p input
          gh release download "$TAG" --repo "${{ env.UPSTREAM_REPO }}" --pattern '*.apk' --dir input

      - name: Compose release notes
        id: notes
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
          UPSTREAM_NAME: ${{ needs.resolve.outputs.upstream_name }}
          UPSTREAM_BODY: ${{ needs.resolve.outputs.upstream_body }}
        run: |
          set -euo pipefail
          {
            echo "- Build: [Action run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- Upstream: [${UPSTREAM_NAME:-$TAG}](https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/$TAG)"
            if [ -n "$UPSTREAM_BODY" ]; then
              printf '\n---\n\n## Upstream release notes\n\n%s\n' "$UPSTREAM_BODY"
            fi
          } > /tmp/release-notes.md
          echo "title=${UPSTREAM_NAME:-$TAG}" >> "$GITHUB_OUTPUT"

      - name: Patch, sign & publish release
        uses: ./.github/actions/patch-and-release
        with:
          apk-dir: input
          app-name: ${{ env.APP_NAME }}
          tag: ${{ needs.resolve.outputs.tag }}
          title: ${{ steps.notes.outputs.title }}
          notes-file: /tmp/release-notes.md
          prerelease: "false"
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.KEYSTORE_PASSWORD }}
          github-token: ${{ github.token }}
